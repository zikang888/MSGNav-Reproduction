# General
seed: 77
exp_name: "example_goatbench"

output_parent_dir: "results"
scene_dataset_config_path: "data/hm3d_annotated_basis.scene_dataset_config.json"
# scene_data_path: "/home/dataset-local/data1/lx22/hsun/hsun/Dataset/data/scene_datasets/hm3d"
scene_data_path: "/root/autodl-tmp/MSGNav/data/scene_datasets/hm3d"
# test_data_dir: "data/goat_bench/val_unseen/content/"
test_data_dir: "/root/autodl-tmp/MSGNav/data/goat_bench/val_unseen/content/"

concept_graph_config_path: "cfg/concept_graph_default.yaml"

# major settings
choose_every_step: true  # whether to query vlm at each step, or only after arriving at the navigation target
egocentric_views: true  # whether to add egocentric views when prompting vlm
prefiltering: true  # whether to use prefiltering (you in fact cannot turn this off, since otherwise it will exceed the context length limit)
use_ollama: false
use_room_filter: true
use_room_det: true
use_AVU: true
AVU_conf_threshold: 0.1

top_k_categories: 20  # keep the top k relevant categories during prefiltering
frames_to_check: 5
task_conf_threshold : 0.5
img_sim_threshold: 0.9
obj_sim_threshold: 0.3
lang_sim_threshold: 0.3
weak_sim_rate: 0.8
dicision_radius: 0.75
# about detection model
yolo_model_name: yolov8x-world.pt
sam_model_name: sam_l.pt
class_set: hm3d  # use the 200-class set for yolo-world detector


#scene_graph_parameters
  # the distance threshold for edge construction
min_points_threshold: 16
mask_area_threshold: 25
max_bbox_area_ratio: 0.5
min_detection: 1
mask_conf_threshold: 0.95
downsample_voxel_size: 0.025
dbscan_remove_noise: True
dbscan_eps: 0.1
dbscan_min_points: 10
obj_min_points: 0
obj_min_detections: 3
merge_overlap_thresh: 0.7
merge_visual_sim_thresh: 0.8
merge_text_sim_thresh: 0.8
denoise_interval: 20
filter_interval: -1
merge_interval: 20
save_pcd: True
save_suffix: 'overlap_maskconf0.95_simsum1.2_dbscan.1_merge20_masksub'
vis_render: False
debug_render: False
class_agnostic: True
save_objects_all_frames: True
render_camera_path: 'replica_room0.json'
max_num_points: 512
sim_threshold: 0.8
sim_threshold_spatial: 0.01
skip_bg: True
spatial_sim_type: 'overlap'


# camera, image
camera_height: 1.5
camera_tilt_deg: -30
img_width: 1280
img_height: 1280
hfov: 120

# about goatbench evaluation
success_distance: 0.25  # the distance threshold for a successful navigation
clear_up_memory_every_subtask: false
use_full_obj_list: false

# whether to save visualization (which is slow)
save_visualization: true ########### "false" to speed up, without visualization

# the image size for prompting gpt-4o
prompt_h: 512
prompt_w: 512

# navigation
init_clearance: 0.3
max_step_room_size_ratio: 2
extra_view_phase_1: 6  # the number of extra views
extra_view_angle_deg_phase_1: 40  # the angle between each extra view
extra_view_phase_2: 6
extra_view_angle_deg_phase_2: 40

# about tsdf, depth map, and frontier updates
explored_depth: 1.7
tsdf_grid_size: 0.1
margin_w_ratio: 0.25
margin_h_ratio: 0.6
planner:
  eps: 1
  max_dist_from_cur_phase_1: 1  # when the target object is not found, explore the frontiers with this step length
  max_dist_from_cur_phase_2: 1  # when the target object is found, go to the target object with this step length
  final_observe_distance: 1.5  # in phase 2, find a place that is this far from the target object to observe it
  surrounding_explored_radius: 0.7

  # about frontier selection
  frontier_edge_area_min: 4
  frontier_edge_area_max: 6
  frontier_area_min: 8
  frontier_area_max: 9
  min_frontier_area: 20  # the frontier should have at least this many pixels
  max_frontier_angle_range_deg: 150  # the angle spanned by the pixels in a frontier should not be larger than this
  region_equal_threshold: 0.95

# about scene graph construction
scene_graph:
  confidence: 0.003
  nms_threshold: 0.1
  iou_threshold: 0.5
  obj_include_dist: 3.5
  target_obj_iou_threshold: 0.6